name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build_jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat JAR
        run: ./gradlew :oag-app:shadowJar -PreleaseVersion=${GITHUB_REF#refs/tags/v}
      - name: Run tests
        run: ./gradlew test
      - name: Prepare JAR
        run: cp oag-app/build/libs/*-all.jar oag.jar
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: oag-jar
          path: oag.jar

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat JAR
        run: ./gradlew :oag-app:shadowJar -PreleaseVersion=${GITHUB_REF#refs/tags/v}
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          MAJOR=$(echo $TAG | cut -d. -f1)
          MINOR=$(echo $TAG | cut -d. -f1-2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository }}:latest

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: oag-linux-amd64
            binary: oag-app/build/native/nativeCompile/oag
            suffix: ""
          - os: macos-15-intel
            artifact: oag-macos-amd64
            binary: oag-app/build/native/nativeCompile/oag
            suffix: ""
          - os: macos-latest
            artifact: oag-macos-arm64
            binary: oag-app/build/native/nativeCompile/oag
            suffix: ""
          - os: windows-latest
            artifact: oag-windows-amd64
            binary: oag-app/build/native/nativeCompile/oag.exe
            suffix: ".exe"
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build native image
        run: ./gradlew :oag-app:nativeCompile -PreleaseVersion=${GITHUB_REF#refs/tags/v}
        shell: bash
      - name: Rename binary
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}${{ matrix.suffix }}"
        shell: bash
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.suffix }}

  release:
    needs: [build_jar, native]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: oag-*
          path: .
          merge-multiple: true
          if-no-files-found: ignore
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OAG ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'v0') }}
          files: |
            oag.jar
            oag-linux-amd64
            oag-macos-amd64
            oag-macos-arm64
            oag-windows-amd64.exe
