site_name: OAG Documentation
site_description: Open Agent Guard — portable runtime policy and audit layer for AI agents
site_url: https://mustafadakhel.github.io/oag/
repo_url: https://github.com/mustafadakhel/oag
repo_name: mustafadakhel/oag

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.mark
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts: concepts.md
  - Configuration: configuration.md
  - CLI Reference: cli.md
  - Security: security.md
  - Observability: observability.md
  - Operations: operations.md
  - Plugins: plugins.md
  - Examples:
    - Policy Examples: examples/policy-examples.md
