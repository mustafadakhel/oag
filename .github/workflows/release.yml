name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat JAR
        run: ./gradlew :oag-app:shadowJar -PreleaseVersion=${GITHUB_REF#refs/tags/v}
      - name: Run tests
        run: ./gradlew test
      - name: Prepare JAR
        run: cp oag-app/build/libs/*-all.jar oag.jar
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OAG ${{ github.ref_name }}
          generate_release_notes: true
          files: oag.jar

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: oag-linux-amd64
            binary: oag-app/build/native/nativeCompile/oag
            suffix: ""
          - os: macos-13
            artifact: oag-macos-amd64
            binary: oag-app/build/native/nativeCompile/oag
            suffix: ""
          - os: macos-latest
            artifact: oag-macos-arm64
            binary: oag-app/build/native/nativeCompile/oag
            suffix: ""
          - os: windows-latest
            artifact: oag-windows-amd64
            binary: oag-app/build/native/nativeCompile/oag.exe
            suffix: ".exe"
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build native image
        run: ./gradlew :oag-app:nativeCompile -PreleaseVersion=${GITHUB_REF#refs/tags/v}
        shell: bash
      - name: Rename binary
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}${{ matrix.suffix }}"
        shell: bash
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}${{ matrix.suffix }}
