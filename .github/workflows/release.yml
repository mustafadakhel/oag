name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  fat-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build fat JAR
        run: ./gradlew :oag-app:shadowJar -PreleaseVersion=${GITHUB_REF#refs/tags/v}
      - name: Run tests
        run: ./gradlew test
      - name: Prepare JAR
        run: cp oag-app/build/libs/*-all.jar oag.jar
      - uses: actions/upload-artifact@v4
        with:
          name: oag-jar
          path: oag.jar

  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: oag-linux-amd64
            binary: oag-app/build/native/nativeCompile/oag
          - os: macos-13
            artifact: oag-macos-amd64
            binary: oag-app/build/native/nativeCompile/oag
          - os: macos-latest
            artifact: oag-macos-arm64
            binary: oag-app/build/native/nativeCompile/oag
          - os: windows-latest
            artifact: oag-windows-amd64
            binary: oag-app/build/native/nativeCompile/oag.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build native image
        run: ./gradlew :oag-app:nativeCompile -PreleaseVersion=${GITHUB_REF#refs/tags/v}
        shell: bash
      - name: Rename binary
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}${{ contains(matrix.os, 'windows') && '.exe' || '' }}"
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ contains(matrix.os, 'windows') && '.exe' || '' }}

  release:
    needs: [fat-jar, native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -lhR artifacts/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OAG ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/oag.jar
            artifacts/oag-linux-amd64
            artifacts/oag-macos-amd64
            artifacts/oag-macos-arm64
            artifacts/oag-windows-amd64.exe
